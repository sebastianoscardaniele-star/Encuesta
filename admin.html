<!doctype html><html lang="es"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Customer Insights Portal</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script><style>
:root{--brand:#10049E;--bg:#f5f7fb;--text:#171729;--muted:#697083;--card:#fff;--line:#e6e8f2}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#070324;color:white;padding:24px}.logo{width:150px;max-height:90px;object-fit:contain;background:white;border-radius:18px;padding:10px;margin-bottom:24px}.nav div{padding:13px 14px;border-radius:14px;margin:8px 0;background:rgba(255,255,255,.06);font-weight:800}.main{padding:28px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center}.title{font-size:30px;font-weight:950}.btn{background:var(--brand);color:#fff;border:0;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer}.btn2{background:#fff;color:var(--brand);border:1px solid var(--line);border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer}.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 12px 32px rgba(16,4,158,.08)}.login{max-width:430px;margin:80px auto}.login input,.filters input,.filters select{width:100%;padding:13px;border:1px solid var(--line);border-radius:14px;margin:8px 0;font:inherit}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:22px 0}.kpi .n{font-size:32px;font-weight:950;color:var(--brand)}.kpi .l{color:var(--muted);font-weight:800}.filters{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden}th,td{text-align:left;padding:13px;border-bottom:1px solid var(--line);font-size:14px}th{background:#f0efff;color:var(--brand)}.msg{padding:12px;border-radius:14px;margin-top:12px;font-weight:800}.err{background:#ffecec;color:#9b1c1c}.hide{display:none}@media(max-width:900px){.layout{grid-template-columns:1fr}.side{display:none}.grid{grid-template-columns:1fr 1fr}.filters{grid-template-columns:1fr}.main{padding:16px}}
</style></head><body><div id="login" class="login card"><img src="./assets/logo-tienda-ciudad.png" class="logo" onerror="this.style.display='none'"/><h1>Customer Insights Portal</h1><p>Ingresá con tu usuario administrador de Supabase.</p><input id="email" placeholder="Email"/><input id="password" type="password" placeholder="Contraseña"/><button class="btn" onclick="login()">Ingresar</button><div id="loginMsg"></div></div><div id="app" class="layout hide"><aside class="side"><img src="./assets/logo-tienda-ciudad.png" class="logo"/><div class="nav"><div>Dashboard</div><div>Encuestas</div><div>Campañas</div><div>Usuarios</div><div>Configuración</div></div></aside><main class="main"><div class="top"><div><div class="title">Dashboard</div><div id="profile">Administrador</div></div><div><button class="btn2" onclick="exportCSV()">Descargar CSV</button> <button class="btn" onclick="logout()">Salir</button></div></div><section class="grid"><div class="card kpi"><div class="n" id="kTotal">0</div><div class="l">Respuestas</div></div><div class="card kpi"><div class="n" id="kToday">0</div><div class="l">Hoy</div></div><div class="card kpi"><div class="n" id="kTop">-</div><div class="l">Motivo principal</div></div><div class="card kpi"><div class="n" id="kStores">0</div><div class="l">Tiendas</div></div></section><section class="card"><div class="filters"><input id="fText" placeholder="Buscar email, seller o carrito" oninput="render()"/><input id="fFrom" type="date" onchange="loadData()"/><input id="fTo" type="date" onchange="loadData()"/><select id="fStore" onchange="render()"><option value="">Todas las tiendas</option></select><select id="fReason" onchange="render()"><option value="">Todos los motivos</option></select></div><table><thead><tr><th>Fecha</th><th>Email</th><th>Tienda</th><th>Seller</th><th>Carrito</th><th>Motivo</th><th>Detalle</th></tr></thead><tbody id="rows"></tbody></table></section></main></div><script>
const cfg=window.APP_CONFIG||{}; let supabase=null; let data=[];function setMsg(t){document.getElementById('loginMsg').innerHTML='<div class="msg err">'+t+'</div>'}function init(){if(!cfg.SUPABASE_URL||cfg.SUPABASE_URL.includes('PEGAR_')){setMsg('Falta configurar config.js con Supabase.');return}supabase=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);supabase.auth.getSession().then(({data})=>{if(data.session)showApp()})}async function login(){const email=document.getElementById('email').value;const password=document.getElementById('password').value;const {error}=await supabase.auth.signInWithPassword({email,password});if(error)return setMsg(error.message);showApp()}async function logout(){await supabase.auth.signOut();location.reload()}async function showApp(){document.getElementById('login').classList.add('hide');document.getElementById('app').classList.remove('hide');await loadData()}async function loadData(){let q=supabase.from('survey_responses').select('*').order('created_at',{ascending:false}).limit(1000);const from=document.getElementById('fFrom').value;const to=document.getElementById('fTo').value;if(from)q=q.gte('created_at',from+'T00:00:00');if(to)q=q.lte('created_at',to+'T23:59:59');const {data:rows,error}=await q;if(error){alert(error.message);return}data=rows||[];fillFilters();render()}function fillFilters(){const stores=[...new Set(data.map(x=>x.store).filter(Boolean))];const reasons=[...new Set(data.map(x=>x.reason_label).filter(Boolean))];const fs=document.getElementById('fStore'), fr=document.getElementById('fReason');const keepS=fs.value, keepR=fr.value;fs.innerHTML='<option value="">Todas las tiendas</option>'+stores.map(s=>'<option>'+s+'</option>').join('');fr.innerHTML='<option value="">Todos los motivos</option>'+reasons.map(s=>'<option>'+s+'</option>').join('');fs.value=keepS;fr.value=keepR}function filtered(){const text=document.getElementById('fText').value.toLowerCase();const store=document.getElementById('fStore').value;const reason=document.getElementById('fReason').value;return data.filter(x=>(!text||[x.email,x.seller,x.cart_id,x.reason_label].join(' ').toLowerCase().includes(text))&&(!store||x.store===store)&&(!reason||x.reason_label===reason))}function render(){const rows=filtered();document.getElementById('kTotal').textContent=rows.length;const today=new Date().toISOString().slice(0,10);document.getElementById('kToday').textContent=rows.filter(x=>(x.created_at||'').slice(0,10)===today).length;const counts={};rows.forEach(x=>counts[x.reason_label]=(counts[x.reason_label]||0)+1);document.getElementById('kTop').textContent=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0]?.slice(0,18)||'-';document.getElementById('kStores').textContent=new Set(rows.map(x=>x.store).filter(Boolean)).size;document.getElementById('rows').innerHTML=rows.map(x=>'<tr><td>'+fmt(x.created_at)+'</td><td>'+(x.email||'-')+'</td><td>'+(x.store||'-')+'</td><td>'+(x.seller||'-')+'</td><td>'+(x.cart_id||'-')+'</td><td>'+(x.reason_label||'-')+'</td><td>'+(x.other_text||'-')+'</td></tr>').join('')}function fmt(d){return d?new Date(d).toLocaleString('es-AR'):'-'}function exportCSV(){const rows=filtered();const head=['fecha','email','tienda','seller','carrito','motivo','detalle'];const csv=[head.join(',')].concat(rows.map(x=>[x.created_at,x.email,x.store,x.seller,x.cart_id,x.reason_label,x.other_text].map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='encuestas.csv';a.click()}init();
</script></body></html>
